name: Build and Deploy DataPlotter on Windows XP 32-bit (Qt 5.7.1 + MinGW 5.3.0)

on:
  push:
    branches:
      - main
  pull_request:
      branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout DataPlotter repository
      uses: actions/checkout@v4

    # Install MinGW 5.3.0 using Qt Maintenance Tool
    - name: Install MinGW 5.3.0 with Qt Maintenance Tool
      run: |
        echo "Downloading Qt Maintenance Tool..."
        curl -L -o qt-maintenance-tool.exe "https://download.qt.io/official_releases/online_installers/qt-unified-windows-x86-online.exe"
        
        echo "Installing MinGW 5.3.0 via Qt Maintenance Tool..."
        start /wait qt-maintenance-tool.exe --silent --accept-licenses --accept-obligations --default-answer --confirm-command install qt.tools.win32_mingw530
      shell: cmd

    # Verify MinGW installation
    - name: Check MinGW installation
      run: |
        echo "Checking if mingw32-make is available..."
        set PATH=C:/Qt/Tools/mingw530_32/bin;%PATH%
        where mingw32-make || (echo "Error: mingw32-make not found!" && exit 1)
      shell: cmd

    # Cache the compiled Qt 5.7.1 to avoid rebuilding on every run
    - name: Cache Compiled Qt 5.7.1
      id: cache-qt
      uses: actions/cache@v3
      with:
        path: C:/Qt/5.7/mingw53_32
        key: qt-5.7.1-mingw530-built

    # Clone and build Qt 5.7.1 if not cached
    - name: Clone and Build Qt 5.7.1 with MinGW 5.3.0
      if: steps.cache-qt.outputs.cache-hit != 'true'
      run: |
        echo "Cloning BlokasLabs Qt 5.7.1..."
        git clone --depth 1 https://github.com/BlokasLabs/Qt-5.7.1.git C:/Qt/Source
        cd C:/Qt/Source
        
        echo "Setting up MinGW environment..."
        set PATH=C:/Qt/Tools/mingw530_32/bin;%PATH%
        
        echo "Checking if mingw32-make is available..."
        where mingw32-make || (echo "Error: mingw32-make not found!" && exit 1)
        
        echo "Building Qt 5.7.1 with MinGW 5.3.0..."
        mkdir -p C:/Qt/5.7/mingw53_32
        cd qtbase
        configure.bat -top-level -release -opensource -confirm-license -platform win32-g++ -prefix C:/Qt/5.7/mingw53_32
        mingw32-make
        mingw32-make install
      shell: cmd

    - name: Configure CMake
      run: |
        echo "Configuring CMake..."
        cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="C:/Qt/5.7/mingw53_32/lib/cmake"
      shell: cmd

    - name: Build DataPlotter
      run: |
        echo "Building DataPlotter..."
        cmake --build build --config Release
      shell: cmd

    - name: Run legacy deployment script
      run: |
        echo "Running legacy deployment script..."
        python deploy_windows/deploy-legacy.py ^
          --windeployqt "C:/Qt/5.7/mingw53_32/bin/windeployqt.exe" ^
          --vcredist "C:/Windows/System32" ^
          --openssl "C:/Program Files/OpenSSL/bin"
      shell: cmd

    - name: Upload build artifact (zip)
      uses: actions/upload-artifact@v4
      with:
        name: DataPlotter-WindowsXP-Portable
        path: deploy_windows/deploy/DataPlotter*.zip
