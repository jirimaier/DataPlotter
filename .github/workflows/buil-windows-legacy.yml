name: Build and Deploy DataPlotter on Windows XP 32-bit

on:
  push:
    branches:
      - main
  pull_request:
      branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Cache Qt installation
    - name: Cache Extracted Qt
      id: cache-qt
      uses: actions/cache@v3
      with:
        path: C:/Qt/5.7.1
        key: qt-5.7.1-msvc2015

    # Install Qt using the official installer (only if not cached)
    - name: Download and Install Qt 5.7.1
      if: steps.cache-qt.outputs.cache-hit != 'true'
      run: |
        curl -L -o qt-installer.exe "https://download.qt.io/new_archive/qt/5.7/5.7.1/qt-opensource-windows-x86-msvc2015_5.7.1.exe"
        start /wait qt-installer.exe --script qt-installer-script.qs
      shell: cmd

    - name: Configure CMake
      run: |
        cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="C:/Qt/5.7.1/msvc2015/lib/cmake"
      shell: cmd

    - name: Build project
      run: cmake --build build --config Release
      shell: cmd

    - name: Run deployment script
      run: |
        python deploy_windows/deploy-legacy.py ^
          --windeployqt "C:/Qt/5.7.1/msvc2015/bin/windeployqt.exe" ^
          --vcredist "C:/Windows/System32" ^
          --openssl "C:/Program Files/OpenSSL/bin"
      shell: cmd

    - name: Upload build artifact (zip)
      uses: actions/upload-artifact@v4
      with:
        name: DataPlotter-WindowsXP-Portable
        path: deploy_windows/deploy/DataPlotter*.zip
