name: Build and Deploy DataPlotter on Windows XP 32-bit (Qt 5.7.1 + MinGW 5.3.0)

on:
  push:
    branches:
      - main
  pull_request:
      branches:
      - main
  workflow_dispatch:

jobs:
  build:
        runs-on: windows-latest

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        choco install -y mingw --version=5.3.0
        choco install -y ninja
        choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
        choco install -y python
    - name: Download and Extract Qt 5.7.1 Source
      run: |
        Invoke-WebRequest -Uri "https://download.qt.io/archive/qt/5.7/5.7.1/single/qt-everywhere-opensource-src-5.7.1.zip" -OutFile qt-src.zip
        Expand-Archive qt-src.zip -DestinationPath qt-src
      shell: pwsh
    - name: Configure Qt build
      run: |
        cd qt-src/qt-everywhere-opensource-src-5.7.1
        mkdir build
        cd build
        ..\configure -prefix C:\Qt\5.7.1 -platform win32-g++ -opensource -confirm-license -release -nomake tests -nomake examples
      shell: bash
    - name: Build Qt
      run: |
        cd qt-src/qt-everywhere-opensource-src-5.7.1/build
        mingw32-make -j4
      shell: bash
    - name: Install Qt
      run: |
        cd qt-src/qt-everywhere-opensource-src-5.7.1/build
        mingw32-make install
      shell: bash
    - name: Add Qt to PATH
      run: echo "C:\Qt\5.7.1\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8
      shell: pwsh
    - name: Verify installation
      run: |
        qmake --version
        mingw32-make --version
      shell: bash
    - name: Configure CMake
      run: |
        echo "Configuring CMake..."
        cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="C:/Qt/5.7/mingw53_32/lib/cmake"
      shell: cmd

    - name: Build DataPlotter
      run: |
        echo "Building DataPlotter..."
        cmake --build build --config Release
      shell: cmd

    - name: Run legacy deployment script
      run: |
        echo "Running legacy deployment script..."
        python deploy_windows/deploy-legacy.py ^
          --windeployqt "C:/Qt/5.7/mingw53_32/bin/windeployqt.exe" ^
          --vcredist "C:/Windows/System32" ^
          --openssl "C:/Program Files/OpenSSL/bin"
      shell: cmd

    - name: Upload build artifact (zip)
      uses: actions/upload-artifact@v4
      with:
        name: DataPlotter-WindowsXP-Portable
        path: deploy_windows/deploy/DataPlotter*.zip
