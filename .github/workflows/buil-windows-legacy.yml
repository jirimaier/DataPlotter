name: Build and Deploy DataPlotter on Windows XP 32-bit (MinGW 5.3.0)

on:
  push:
    branches:
      - main
  pull_request:
      branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout DataPlotter repository
      uses: actions/checkout@v4

    # Download and Install MinGW 5.3.0 manually
    - name: Download and Install MinGW 5.3.0
      run: |
        echo "Downloading MinGW 5.3.0..."
        curl -L -o mingw530.7z "https://downloads.sourceforge.net/project/mingw-w64/Toolchains targetting Win32/Personal Builds/mingw-builds/5.3.0/threads-win32/dwarf/i686-5.3.0-release-win32-dwarf-rt_v4-rev0.7z"
        
        echo "Extracting MinGW 5.3.0..."
        mkdir -p D:/a/DataPlotter/MinGW530
        "C:\Program Files\7-Zip\7z.exe" x mingw530.7z -oD:/a/DataPlotter/MinGW530

        echo "Adding MinGW 5.3.0 to PATH..."
        echo "D:/a/DataPlotter/MinGW530/bin" >> $GITHUB_PATH
      shell: cmd

    # Verify MinGW installation
    - name: Check MinGW installation
      run: |
        echo "Checking if mingw32-make is available..."
        where mingw32-make || (echo "Error: mingw32-make not found!" && exit 1)
      shell: cmd

    # Cache the compiled Qt 5.7.1 to avoid rebuilding on every run
    - name: Cache Compiled Qt 5.7.1
      id: cache-qt
      uses: actions/cache@v3
      with:
        path: D:/a/DataPlotter/Qt/5.7.1
        key: qt-5.7.1-mingw530-built

    # Clone and build Qt 5.7.1 from BlokasLabs repository if not cached
    - name: Clone and Build Qt 5.7.1 with MinGW 5.3.0
      if: steps.cache-qt.outputs.cache-hit != 'true'
      run: |
        echo "Cloning BlokasLabs Qt 5.7.1..."
        git clone --depth 1 https://github.com/BlokasLabs/Qt-5.7.1.git D:/a/DataPlotter/Qt/Source
        cd D:/a/DataPlotter/Qt/Source
        
        echo "Checking if mingw32-make is available..."
        where mingw32-make || (echo "Error: mingw32-make not found!" && exit 1)
        
        echo "Building Qt 5.7.1 with MinGW 5.3.0..."
        mkdir -p D:/a/DataPlotter/Qt/5.7.1
        cd qtbase
        configure.bat -top-level -release -opensource -confirm-license -platform win32-g++ -prefix D:/a/DataPlotter/Qt/5.7.1
        mingw32-make
        mingw32-make install
      shell: cmd

    - name: Configure CMake
      run: |
        echo "Configuring CMake..."
        cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="D:/a/DataPlotter/Qt/5.7.1/lib/cmake"
      shell: cmd

    - name: Build DataPlotter
      run: |
        echo "Building DataPlotter..."
        cmake --build build --config Release
      shell: cmd

    - name: Run legacy deployment script
      run: |
        echo "Running legacy deployment script..."
        python deploy_windows/deploy-legacy.py ^
          --windeployqt "D:/a/DataPlotter/Qt/5.7.1/bin/windeployqt.exe" ^
          --vcredist "C:/Windows/System32" ^
          --openssl "C:/Program Files/OpenSSL/bin"
      shell: cmd

    - name: Upload build artifact (zip)
      uses: actions/upload-artifact@v4
      with:
        name: DataPlotter-WindowsXP-Portable
        path: deploy_windows/deploy/DataPlotter*.zip
