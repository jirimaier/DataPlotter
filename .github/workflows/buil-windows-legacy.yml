name: Build and Deploy DataPlotter on Windows XP 32-bit

on:
  push:
    branches:
      - main
  pull_request:
      branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout DataPlotter repository
      uses: actions/checkout@v4

    # Download and Install Visual Studio 2015 Build Tools manually
    - name: Download and Install VS2015 Build Tools
      run: |
        echo "Downloading Visual Studio 2015 Build Tools..."
        curl -L -o vs2015_buildtools.exe "https://download.microsoft.com/download/2/F/D/2FD2A33A-B5B6-4AC3-BCE0-4E10B5A7FCE3/vs_buildtools.exe"
        
        echo "Installing Visual Studio 2015 Build Tools..."
        start /wait vs2015_buildtools.exe --quiet --wait --norestart --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64
      shell: cmd

    # Locate and set up Visual Studio 2015 environment
    - name: Setup MSVC 2015 Environment
      run: |
        echo "Searching for Visual Studio 2015 vcvarsall.bat..."
        FOR /F "tokens=*" %%i IN ('where /R "C:\Program Files (x86)\Microsoft Visual Studio 14.0\VC" vcvarsall.bat 2^>nul') DO SET VCVARS_PATH=%%i
        IF NOT EXIST "%VCVARS_PATH%" (echo "Error: vcvarsall.bat for VS2015 not found!" && exit 1)
        
        echo "Using vcvarsall.bat from: %VCVARS_PATH%"
        call "%VCVARS_PATH%" x86 || (echo "Error: Failed to load Visual Studio 2015 environment!" && exit 1)

        echo "Checking if nmake is available..."
        where nmake || (echo "Error: nmake not found!" && exit 1)
      shell: cmd

    # Cache the compiled Qt 5.7.1 to avoid rebuilding on every run
    - name: Cache Compiled Qt 5.7.1
      id: cache-qt
      uses: actions/cache@v3
      with:
        path: D:/a/DataPlotter/Qt/5.7.1
        key: qt-5.7.1-msvc2015-built

    # Clone and build Qt 5.7.1 from BlokasLabs repository if not cached
    - name: Clone and Build Qt 5.7.1
      if: steps.cache-qt.outputs.cache-hit != 'true'
      run: |
        echo "Cloning BlokasLabs Qt 5.7.1..."
        git clone --depth 1 https://github.com/BlokasLabs/Qt-5.7.1.git D:/a/DataPlotter/Qt/Source
        cd D:/a/DataPlotter/Qt/Source
        
        echo "Setting up Visual Studio 2015 environment..."
        call "%VCVARS_PATH%" x86 || (echo "Error: vcvarsall.bat not found!" && exit 1)
        
        echo "Checking if nmake is available..."
        where nmake || (echo "Error: nmake not found!" && exit 1)
        
        echo "Building Qt 5.7.1..."
        mkdir -p D:/a/DataPlotter/Qt/5.7.1
        cd qtbase
        configure.bat -top-level -release -opensource -confirm-license -platform win32-msvc2015 -prefix D:/a/DataPlotter/Qt/5.7.1
        nmake
        nmake install
      shell: cmd

    - name: Configure CMake
      run: |
        echo "Configuring CMake..."
        cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="D:/a/DataPlotter/Qt/5.7.1/lib/cmake"
      shell: cmd

    - name: Build DataPlotter
      run: |
        echo "Building DataPlotter..."
        cmake --build build --config Release
      shell: cmd

    - name: Run legacy deployment script
      run: |
        echo "Running legacy deployment script..."
        python deploy_windows/deploy-legacy.py ^
          --windeployqt "D:/a/DataPlotter/Qt/5.7.1/bin/windeployqt.exe" ^
          --vcredist "C:/Windows/System32" ^
          --openssl "C:/Program Files/OpenSSL/bin"
      shell: cmd

    - name: Upload build artifact (zip)
      uses: actions/upload-artifact@v4
      with:
        name: DataPlotter-WindowsXP-Portable
        path: deploy_windows/deploy/DataPlotter*.zip
