name: Build and Deploy DataPlotter on Windows XP 32-bit (Qt 5.7.1 + MinGW 5.3.0)

on:
  push:
    branches:
      - main
  pull_request:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (7-Zip, Ninja, CMake, Perl, Python, Ruby, MinGW 5.3.0)
        run: |
          choco install -y ninja
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install -y strawberryperl
          choco install -y python2
          choco install -y ruby
          choco install -y mingw --version=5.3.0
        shell: powershell

      - name: Cache Qt Source
        id: cache-qt-src
        uses: actions/cache@v4
        with:
          path: qt-src
          key: qt-5.7.1-source-folder

      - name: Clone Qt 5.7.1 Source from BlokasLabs Repository
        if: steps.cache-qt-src.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/BlokasLabs/Qt-5.7.1.git qt-src
        shell: bash

      - name: Patch Qt to Fix `_FILE_ID_INFO` Redefinition Error
        run: |
          sed -i 's/typedef struct _FILE_ID_INFO {/\/\/ typedef struct _FILE_ID_INFO {/' qt-src/qtbase/src/corelib/io/qfilesystemengine_win.cpp
          sed -i 's/} FILE_ID_INFO, \*PFILE_ID_INFO;/\/\/ } FILE_ID_INFO, \*PFILE_ID_INFO;/' qt-src/qtbase/src/corelib/io/qfilesystemengine_win.cpp
        shell: bash

      - name: Cache Qt Build
        id: cache-qt-build
        uses: actions/cache@v4
        with:
          path: qt-src/build
          key: qt-5.7.1-build-win32

      - name: Configure Qt build
        if: steps.cache-qt-build.outputs.cache-hit != 'true'
        run: |
          cd qt-src
          mkdir -p build
          cd build
          ..\configure -prefix %CD%\qtbase -opensource -confirm-license -release -nomake tests -nomake examples
        shell: cmd

      - name: Build Qt
        if: steps.cache-qt-build.outputs.cache-hit != 'true'
        run: |
          cd qt-src/build
          mingw32-make -j4
        shell: cmd

      - name: Install Qt
        run: |
          cd qt-src/build
          mingw32-make install
        shell: cmd

      - name: Add Qt to PATH
        run: echo "C:\\Qt-5.7.1\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Verify Qt installation
        run: |
          qmake --version
          mingw32-make --version
        shell: bash

      - name: Configure CMake
        run: |
          echo "Configuring CMake..."
          cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="C:/Qt-5.7.1/lib/cmake"
        shell: cmd

      - name: Build DataPlotter
        run: |
          echo "Building DataPlotter..."
          cmake --build build --config Release
        shell: cmd

      - name: Run legacy deployment script
        run: |
          echo "Running legacy deployment script..."
          python deploy_windows/deploy-legacy.py ^
            --windeployqt "C:/Qt-5.7.1/bin/windeployqt.exe" ^
            --vcredist "C:/Windows/System32" ^
            --openssl "C:/Program Files/OpenSSL/bin"
        shell: cmd

      - name: Upload build artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: DataPlotter-WindowsXP-Portable
          path: deploy_windows/deploy/DataPlotter*.zip
