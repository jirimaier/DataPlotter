name: Windows Qt Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install aqtinstall
      run: python -m pip install aqtinstall

    - name: Install Qt 5.15.5 with necessary components
      run: |
        aqt install-qt windows desktop 5.15.5 win64_msvc2019 --modules qtserialport,qtbase,qtnetwork,qtqml,qtquick

    - name: Set up MSVC 2019
      uses: ilammy/msvc-dev-cmd@v1

    - name: Verify Qt installation
      run: |
        echo "QT_DIR=$(qt5_env.bat && echo %QTDIR%)" >> $GITHUB_ENV
        echo "Qt installed in $QT_DIR"

    - name: Build project with CMake
      run: |
        mkdir build
        cd build
        cmake -G "NMake Makefiles" -DCMAKE_PREFIX_PATH="%QT_DIR%" ..
        nmake
